apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  labels:
    app.kubernetes.io/name: cloudflare-ddns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflare-ddns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflare-ddns
    spec:
      restartPolicy: Always
      containers:
        - name: controller
          image: favonia/cloudflare-ddns:1.15.1
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: IP6_PROVIDER
              value: none
            - name: PROXIED
              value: "false"
#            - name: DOMAINS
#              value: ""
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cf-ddns-token
                  key: token
            - name: UPDATE_CRON
              value: "@every 1m"

